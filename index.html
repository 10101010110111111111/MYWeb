<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 INSANE Email Power - Live Demo!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero {
            text-align: center;
            padding: 60px 0;
            position: relative;
        }

        .hero h1 {
            font-size: 4rem;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .hero p {
            font-size: 1.5rem;
            color: white;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .email-showcase {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }

        .email-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transform: translateY(0);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .email-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .email-card:hover::before {
            left: 100%;
        }

        .email-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .email-input {
            width: 100%;
            padding: 15px;
            border: 3px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .email-input:focus {
            outline: none;
            border-color: #e73c7e;
            box-shadow: 0 0 20px rgba(231, 60, 126, 0.3);
            transform: scale(1.02);
        }

        .auto-send-btn {
            width: 100%;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .auto-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .auto-send-btn:active {
            transform: scale(0.98);
        }

        .status-display {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
            animation: successPulse 0.5s ease;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
            animation: shake 0.5s ease;
        }

        .status-sending {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }

        @keyframes successPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #856404;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats-section {
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 40px;
            margin: 40px 0;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .stat-item {
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .stat-item:hover {
            transform: scale(1.05);
        }

        .stat-number {
            font-size: 3rem;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-email {
            position: absolute;
            font-size: 2rem;
            color: rgba(255,255,255,0.1);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .message-form {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            margin: 40px 0;
        }

        .message-textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 3px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .message-textarea:focus {
            outline: none;
            border-color: #23d5ab;
            box-shadow: 0 0 20px rgba(35, 213, 171, 0.3);
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            
            .hero p {
                font-size: 1.2rem;
            }
            
            .email-showcase {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="floating-elements">
        <div class="floating-email" style="top: 10%; left: 10%; animation-delay: 0s;">📧</div>
        <div class="floating-email" style="top: 20%; right: 15%; animation-delay: 1s;">✉️</div>
        <div class="floating-email" style="top: 60%; left: 5%; animation-delay: 2s;">📨</div>
        <div class="floating-email" style="top: 70%; right: 10%; animation-delay: 3s;">📩</div>
        <div class="floating-email" style="top: 40%; left: 80%; animation-delay: 4s;">💌</div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>🚀 INSANE EMAIL POWER!</h1>
            <p>Watch our lightning-fast email system in action!</p>
        </div>

        <div class="email-showcase">
            <div class="email-card">
                <h3 class="card-title">⚡ Instant Auto-Send</h3>
                <input type="email" class="email-input" id="autoEmail" placeholder="Enter your email and watch the magic!">
                <button class="auto-send-btn" onclick="sendAutoEmail()">🔥 AUTO-SEND WELCOME EMAIL</button>
                <div class="status-display" id="autoStatus"></div>
            </div>

            <div class="email-card">
                <h3 class="card-title">💎 Premium Notification</h3>
                <input type="email" class="email-input" id="premiumEmail" placeholder="Get VIP treatment!">
                <button class="auto-send-btn" onclick="sendPremiumEmail()" style="background: linear-gradient(45deg, #667eea, #764ba2);">👑 SEND VIP EMAIL</button>
                <div class="status-display" id="premiumStatus"></div>
            </div>

            <div class="email-card">
                <h3 class="card-title">🎯 Targeted Message</h3>
                <input type="email" class="email-input" id="targetEmail" placeholder="Personalized just for you!">
                <button class="auto-send-btn" onclick="sendTargetedEmail()" style="background: linear-gradient(45deg, #23d5ab, #23a6d5);">🎪 SEND CUSTOM EMAIL</button>
                <div class="status-display" id="targetStatus"></div>
            </div>
        </div>

        <div class="stats-section">
            <h2>📊 LIVE EMAIL STATS</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-number" id="emailsSent">0</span>
                    <span class="stat-label">Emails Sent Today</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="successRate">100%</span>
                    <span class="stat-label">Success Rate</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="avgSpeed">0.8s</span>
                    <span class="stat-label">Avg Send Speed</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="totalUsers">1,337</span>
                    <span class="stat-label">Happy Users</span>
                </div>
            </div>
        </div>

        <div class="message-form">
            <h3 class="card-title">💬 Send Custom Message</h3>
            <input type="email" class="email-input" id="messageEmail" placeholder="Your email address">
            <textarea class="message-textarea" id="customMessage" placeholder="Type your custom message here..."></textarea>
            <button class="auto-send-btn" onclick="sendCustomMessage()" style="background: linear-gradient(45deg, #ee5a24, #ff6b6b);">🚀 BLAST OFF MESSAGE!</button>
            <div class="status-display" id="messageStatus"></div>
        </div>
    </div>

    <!-- EmailJS CDN -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <script type="text/javascript">
        // Initialize EmailJS
        (function(){
            emailjs.init({
                publicKey: "KD57WUMypkx8bl3wY",
            });
        })();

        let emailCount = 0;
        let successCount = 0;

        function updateStats() {
            document.getElementById('emailsSent').textContent = emailCount;
            const rate = emailCount > 0 ? Math.round((successCount / emailCount) * 100) : 100;
            document.getElementById('successRate').textContent = rate + '%';
            document.getElementById('avgSpeed').textContent = (Math.random() * 0.5 + 0.5).toFixed(1) + 's';
            document.getElementById('totalUsers').textContent = (1337 + emailCount).toLocaleString();
        }

        function showStatus(elementId, type, message) {
            const statusEl = document.getElementById(elementId);
            statusEl.className = `status-display status-${type}`;
            
            if (type === 'sending') {
                statusEl.innerHTML = `<div class="spinner"></div>${message}`;
            } else {
                statusEl.textContent = message;
            }
        }

        async function sendEmail(templateId, params, statusElementId, successMessage) {
            showStatus(statusElementId, 'sending', 'Sending email...');
            emailCount++;
            
            try {
                const response = await emailjs.send(
                    'service_2k7c6tu',
                    templateId,
                    params
                );
                
                console.log('Email sent successfully:', response);
                successCount++;
                showStatus(statusElementId, 'success', `✅ ${successMessage}`);
                updateStats();
                return true;
            } catch (error) {
                console.error('Email sending failed:', error);
                showStatus(statusElementId, 'error', '❌ Failed to send. Please try again!');
                updateStats();
                return false;
            }
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        async function sendAutoEmail() {
            const email = document.getElementById('autoEmail').value.trim();
            
            if (!email) {
                showStatus('autoStatus', 'error', '❌ Please enter your email!');
                return;
            }
            
            if (!validateEmail(email)) {
                showStatus('autoStatus', 'error', '❌ Please enter a valid email!');
                return;
            }

            const params = {
                to_email: email,
                to_name: 'New User',
                message: `Welcome to our INSANE email system! 🚀\n\nYou just experienced our lightning-fast auto-send feature. This email was sent instantly when you clicked the button!\n\nFeatures you just witnessed:\n✅ Instant delivery\n✅ Beautiful animations\n✅ Real-time status updates\n✅ Professional email templates\n\nThanks for testing our amazing email system!`,
                from_name: 'Email Power Team',
                subject: '🚀 Welcome to Email Power - Auto-Send Success!',
                timestamp: new Date().toLocaleString()
            };

            await sendEmail('template_a73p05r', params, 'autoStatus', 'Welcome email sent instantly!');
        }

        async function sendPremiumEmail() {
            const email = document.getElementById('premiumEmail').value.trim();
            
            if (!email) {
                showStatus('premiumStatus', 'error', '❌ Please enter your email!');
                return;
            }
            
            if (!validateEmail(email)) {
                showStatus('premiumStatus', 'error', '❌ Please enter a valid email!');
                return;
            }

            const params = {
                to_email: email,
                to_name: 'VIP Member',
                message: `🌟 PREMIUM VIP NOTIFICATION 🌟\n\nCongratulations! You've just experienced our premium email delivery system.\n\n💎 VIP Benefits:\n• Lightning-fast delivery (< 1 second)\n• Premium email templates\n• 99.9% delivery guarantee\n• Real-time tracking\n• Advanced animations\n\nYou're now part of our exclusive VIP community!\n\nBest regards,\nThe Premium Team 👑`,
                from_name: 'VIP Email Service',
                subject: '👑 VIP Email Delivered - Premium Experience!',
                timestamp: new Date().toLocaleString()
            };

            await sendEmail('template_a73p05r', params, 'premiumStatus', 'VIP email delivered like royalty!');
        }

        async function sendTargetedEmail() {
            const email = document.getElementById('targetEmail').value.trim();
            
            if (!email) {
                showStatus('targetStatus', 'error', '❌ Please enter your email!');
                return;
            }
            
            if (!validateEmail(email)) {
                showStatus('targetStatus', 'error', '❌ Please enter a valid email!');
                return;
            }

            const domain = email.split('@')[1];
            const params = {
                to_email: email,
                to_name: 'Valued User',
                message: `🎯 PERSONALIZED MESSAGE FOR YOU!\n\nHi there! We noticed you're using ${domain} - great choice!\n\nThis email was automatically customized based on your email address. Our smart system detected:\n\n📧 Email: ${email}\n🌐 Domain: ${domain}\n⏰ Sent at: ${new Date().toLocaleString()}\n🎪 Message ID: ${Math.random().toString(36).substr(2, 9).toUpperCase()}\n\nOur targeting system works flawlessly every time!\n\nPersonally yours,\nThe Smart Email Team 🤖`,
                from_name: 'Targeted Email System',
                subject: '🎯 Personalized Email - Targeted Just For You!',
                timestamp: new Date().toLocaleString()
            };

            await sendEmail('template_a73p05r', params, 'targetStatus', 'Targeted email hit the bullseye!');
        }

        async function sendCustomMessage() {
            const email = document.getElementById('messageEmail').value.trim();
            const message = document.getElementById('customMessage').value.trim();
            
            if (!email) {
                showStatus('messageStatus', 'error', '❌ Please enter your email!');
                return;
            }
            
            if (!validateEmail(email)) {
                showStatus('messageStatus', 'error', '❌ Please enter a valid email!');
                return;
            }
            
            if (!message) {
                showStatus('messageStatus', 'error', '❌ Please enter a message!');
                return;
            }

            const params = {
                to_email: email,
                to_name: 'Message Recipient',
                message: `🚀 CUSTOM MESSAGE DELIVERY!\n\nYour custom message:\n\n"${message}"\n\n---\n\nThis message was sent through our incredible email system with:\n✨ Custom message support\n⚡ Instant delivery\n🎨 Beautiful formatting\n📊 Real-time tracking\n\nMessage delivered successfully!\n\nBest regards,\nCustom Message Team 💌`,
                from_name: 'Custom Message System',
                subject: '💌 Your Custom Message - Delivered!',
                timestamp: new Date().toLocaleString()
            };

            const success = await sendEmail('template_a73p05r', params, 'messageStatus', 'Custom message blasted off successfully!');
            
            if (success) {
                document.getElementById('customMessage').value = '';
                document.getElementById('messageEmail').value = '';
            }
        }

        // Auto-send demo emails on page load
        document.addEventListener('DOMContentLoaded', function() {
            updateStats();
            
            // Add some visual flair
            setTimeout(() => {
                const cards = document.querySelectorAll('.email-card');
                cards.forEach((card, index) => {
                    setTimeout(() => {
                        card.style.transform = 'translateY(-5px)';
                        setTimeout(() => {
                            card.style.transform = 'translateY(0)';
                        }, 200);
                    }, index * 200);
                });
            }, 500);
        });

        // Add some interactive effects
        document.querySelectorAll('.email-input').forEach(input => {
            input.addEventListener('input', function() {
                if (validateEmail(this.value)) {
                    this.style.borderColor = '#23d5ab';
                    this.style.boxShadow = '0 0 15px rgba(35, 213, 171, 0.3)';
                } else if (this.value.length > 0) {
                    this.style.borderColor = '#e74c3c';
                    this.style.boxShadow = '0 0 15px rgba(231, 76, 60, 0.3)';
                } else {
                    this.style.borderColor = '#ddd';
                    this.style.boxShadow = 'none';
                }
            });
        });
    </script>
</body>
</html>
